<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">My Complaints</span>
            <div>
                <a href="/" class="btn btn-outline-light me-2">New Complaint</a>
                <button class="btn btn-outline-light" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Your Complaint History</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped" id="complaintsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Sentiment</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Assigned To</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadComplaints() {
            fetch('/api/user/complaints')
                .then(response => response.json())
                .then(complaints => {
                    const tbody = document.querySelector('#complaintsTable tbody');
                    tbody.innerHTML = '';
                    
                    complaints.forEach(c => {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${c.id}</td>
                            <td>${c.title}</td>
                            <td>${c.category}</td>
                            <td><span class="badge bg-${getSentimentColor(c.sentiment)}">${c.sentiment}</span></td>
                            <td><span class="badge bg-${getPriorityColor(c.priority)}">${c.priority}</span></td>
                            <td>${c.status}</td>
                            <td>${c.assigned_to || 'Unassigned'}</td>
                            <td>${new Date(c.created_at).toLocaleDateString()}</td>
                        `;
                    });
                });
        }
        
        function getSentimentColor(sentiment) {
            return {
                'Positive': 'success',
                'Neutral': 'secondary',
                'Negative': 'danger'
            }[sentiment] || 'secondary';
        }
        
        function getPriorityColor(priority) {
            return {
                'Critical': 'danger',
                'High': 'warning',
                'Medium': 'primary',
                'Low': 'success'
            }[priority] || 'secondary';
        }
        
        function logout() {
            fetch('/api/logout')
                .then(() => window.location.href = '/');
        }
        
        // Load complaints on page load
        loadComplaints();
    </script>
</body>
</html>
